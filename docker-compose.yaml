# Local infra for the evaluation pipeline.
#
# Step 1 (current): MinIO as a local S3 for run artifacts.
# Step 2 (planned): add MLflow server + Airflow services here.
#
# Usage:
#   docker compose up -d minio createbucket
#   MinIO S3 API  -> http://localhost:9000
#   MinIO console -> http://localhost:9001  (minioadmin / minioadmin)

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: create the runs bucket, then exit.
  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin} &&
      mc mb -p local/${S3_BUCKET:-swe-runs} &&
      echo 'bucket ready: ${S3_BUCKET:-swe-runs}'
      "

volumes:
  minio-data:
